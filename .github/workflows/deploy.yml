name: CI & Deploy

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Empty when the secret isn't set — the deploy step is skipped in that case.
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: kvs-core

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install web dependencies
        run: cd web && bun install --frozen-lockfile

      # Builds the release wasm core + the static site into web/build
      # (and strips the dev-only sample data).
      - name: Build
        run: bun run build

      - name: Type-check
        run: cd web && bun run check

      - name: Rust tests
        run: cargo test --manifest-path kvs-core/Cargo.toml

      # Deploy the prebuilt static output to Vercel (master only, and only once
      # the Vercel secrets are configured).
      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/master' && env.VERCEL_TOKEN != ''
        run: |
          mkdir -p .vercel/output/static
          cp -r web/build/. .vercel/output/static/
          printf '%s' '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/.*","dest":"/index.html"}]}' > .vercel/output/config.json
          npm install --global vercel@latest
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
