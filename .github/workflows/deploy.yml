name: CI

# Builds the wasm core + static site and runs the tests on every push/PR.
# Deployment is handled by Vercel's Git integration (it builds only the
# Rust-free web app from the committed wasm) — see README.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: kvs-core

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install web dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Build (release wasm + static site)
        run: bun run build

      - name: Type-check
        run: cd web && bun run check

      - name: Rust tests
        run: cargo test --manifest-path kvs-core/Cargo.toml
